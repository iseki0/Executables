name: Build

on:
  push:
    branches:
      - 'master'
      - 'ci/*'
      - 'feat/*'
      - 'fix/*'
      - 'refactor/*'
      - 'cursor/*'
    pull_request:
    workflow_dispatch:
jobs:
  build:
    strategy:
      matrix:
        os: [ windows-latest, macos-latest, ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version-file: '.java-version'
          distribution: 'temurin'
          server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
          settings-path: ${{ github.workspace }} # location for the settings.xml file
      - name: Cache Konan
        uses: actions/cache@v5
        with:
          enableCrossOsArchive: true
          key: ${{ runner.os }}-gradle
          path: |
            ~/.konan
      - name: Cache Yarn
        uses: actions/cache@v5
        with:
          enableCrossOsArchive: true
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/package.json', '**/yarn.lock') }}
          path: |
            ~/.cache/yarn
            ~/.yarn/cache
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GradleEncryptionKey }} # openssl rand -base64 16
          validate-wrappers: true
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"
          gradle-version: wrapper
      - name: Run build
        if: ${{ matrix.os != 'ubuntu-latest' }}
        run: ./gradlew check --stacktrace
      - name: Run build - CrossCompilation
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: ./gradlew check --stacktrace -Pkotlin.native.enableKlibsCrossCompilation=true

  tool-build:
    needs: build
    strategy:
      matrix:
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version-file: '.java-version'
          distribution: 'temurin'
          server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
          settings-path: ${{ github.workspace }} # location for the settings.xml file
      - name: Cache Konan
        uses: actions/cache@v5
        with:
          enableCrossOsArchive: true
          key: ${{ runner.os }}-gradle
          path: |
            ~/.konan
      - name: Cache Yarn
        uses: actions/cache@v5
        with:
          enableCrossOsArchive: true
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/package.json', '**/yarn.lock') }}
          path: |
            ~/.cache/yarn
            ~/.yarn/cache
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GradleEncryptionKey }} # openssl rand -base64 16
          validate-wrappers: true
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"
          gradle-version: wrapper
      - name: Run build
        run: ./gradlew :bin-tool:build --stacktrace
      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: bin-tool-build-reports-${{ matrix.os }}
          path: bin-tool/build/reports
          if-no-files-found: warn
      - name: Upload built artifacts
        uses: actions/upload-artifact@v5
        with:
          path: bin-tool/build/bin/*/releaseExecutable

